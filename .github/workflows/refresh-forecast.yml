name: Refresh peak forecast

# Regenerates public/peak-forecast/forecast.json server-side and commits it to
# main, so the Peak Forecast tab shows live data without anyone running the
# pipeline by hand. GitHub-hosted runners can reach IESO (reports-public.ieso.ca)
# and ECCC (dd.weather.gc.ca / api.weather.gc.ca), which the Claude sandbox
# cannot — so this is the only place the full fetch->build->forecast chain runs
# unattended. Vercel auto-deploys on the resulting push to main.

on:
  schedule:
    # 10:00 UTC daily = 06:00 EDT / 05:00 EST — early morning ET, after the
    # prior day's demand and peaks are final. Cron is always UTC.
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      # Diagnosis mode (docs/prompts/investigate-low-accuracy-by-lead.md): run
      # the fetch -> build -> backtest -> calibrate chain from the DISPATCHED
      # branch (so instrumented pipeline code can be exercised pre-merge),
      # print the day-vs-window diagnostic table, dump backtest_horizons.json
      # into the log, and stop — no export, no prediction-log append, no
      # commit. Scheduled runs never set this, so daily behavior is unchanged.
      diagnose_only:
        description: 'Diagnostics only (dispatched branch; no export/commit)'
        type: boolean
        default: false

# Only push forecast.json; nothing else. This token's push to main is what
# triggers the Vercel deploy (Vercel's webhook fires regardless of author; the
# GITHUB_TOKEN push does NOT recursively re-trigger this workflow).
permissions:
  contents: write

# Never let two refreshes race on the same file.
concurrency:
  group: refresh-forecast
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Multi-year window so the walk-forward backtest + probability calibration
    # have enough base periods to be meaningful (a trailing 12-month window
    # leaves ~1 evaluable year -> degenerate calibration). Uses the historical
    # fallback peak labels for 2020-2024 (see fetch_peaks). The forecast's
    # running board + predictions still use the latest data in this window.
    env:
      PIPELINE_START: '2020-05-01'
    steps:
      - name: Checkout main (or the dispatched branch in diagnose mode)
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.diagnose_only == true && github.ref_name || 'main' }}
          # Fetch enough history that the commit-if-changed step has a base.
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pipeline/package-lock.json

      - name: Install pipeline deps
        working-directory: pipeline
        run: npm ci

      # Each fetch is its own step so a failure is obvious in the logs. Any
      # failure aborts the job before the commit step, so a broken run never
      # publishes a partial/stale forecast.json.
      - name: Fetch IESO demand
        working-directory: pipeline
        run: npm run fetch:demand

      - name: Fetch ECCC weather (history)
        working-directory: pipeline
        run: npm run fetch:weather

      - name: Fetch ICI peak labels
        working-directory: pipeline
        run: npm run fetch:peaks

      - name: Build hourly dataset
        working-directory: pipeline
        run: npm run build

      # Walk-forward recall backtest -> data/backtest_horizons.json, which
      # forecast.js reads for the "Measured accuracy by lead time" panel. Not
      # run here previously, so accuracyByLead shipped null (panel showed "—").
      - name: Backtest accuracy by lead
        working-directory: pipeline
        run: npm run backtest:horizons

      # Empirical peak-probability calibration -> data/peak_probability.json,
      # which forecast.js reads to emit each peak's numeric P(top-5).
      - name: Calibrate peak probability
        working-directory: pipeline
        run: npm run calibrate

      # Diagnose mode ends here: dump the full per-year horizons JSON into the
      # log (it is not committed anywhere) and skip export/log/commit.
      - name: Dump diagnostic backtest JSON
        if: ${{ inputs.diagnose_only == true }}
        working-directory: pipeline
        run: |
          echo "=== data/backtest_horizons.json ==="
          cat data/backtest_horizons.json
          echo "=== calibration summary (data/peak_probability.json, logistic fits) ==="
          node -e "const j=require('./data/peak_probability.json'); for (const [l,c] of Object.entries(j.byLead)) console.log('lead', l, 'n=', c.n, 'positives=', c.positives, 'logistic b0=', c.logistic.b0.toFixed(3), 'b1=', c.logistic.b1.toFixed(3))"

      - name: Fetch ECCC citypage forecast
        if: ${{ inputs.diagnose_only != true }}
        working-directory: pipeline
        run: npm run fetch:forecast

      - name: Export forecast.json for the dashboard
        if: ${{ inputs.diagnose_only != true }}
        working-directory: pipeline
        run: npm run export:dashboard

      # Append this run's predictions to the durable prospective log and
      # resolve any past ones -> public/peak-forecast/prediction_log.json.
      - name: Update prospective prediction log
        if: ${{ inputs.diagnose_only != true }}
        working-directory: pipeline
        run: npm run log:predictions

      - name: Commit forecast + prediction log if changed
        if: ${{ inputs.diagnose_only != true }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- public/peak-forecast/forecast.json public/peak-forecast/prediction_log.json; then
            echo "forecast.json + prediction_log.json unchanged — nothing to commit."
            exit 0
          fi
          git add public/peak-forecast/forecast.json public/peak-forecast/prediction_log.json
          git commit -m "chore(forecast): refresh peak forecast data [skip ci]"
          # Rebase on any concurrent main updates, then push. Retry a couple of
          # times in case main moved between fetch and push.
          for attempt in 1 2 3; do
            git pull --rebase origin main && git push origin HEAD:main && exit 0
            echo "push attempt $attempt failed; retrying…"
            sleep $((attempt * 3))
          done
          echo "::error::could not push refreshed forecast.json after retries"
          exit 1
