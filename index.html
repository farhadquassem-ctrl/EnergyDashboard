<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Public-facing Ontario electricity market dashboard — IESO locational marginal prices, demand, and HOEP."
    />
    <title>IESO LMP Dashboard — Ontario Electricity Market</title>
    <!-- Apply the persisted theme before first paint (React re-applies it on
         mount). Dark is the default; only an explicit saved 'light' wins. -->
    <script>
      try {
        if (localStorage.getItem('theme') === 'light') {
          document.documentElement.classList.remove('dark')
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
